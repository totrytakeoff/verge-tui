name: Publish APT Repository

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: apt-pages
  cancel-in-progress: true

jobs:
  publish:
    name: Build and Publish APT Repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Import APT signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [[ -z "${APT_GPG_PRIVATE_KEY}" ]]; then
            echo "No APT_GPG_PRIVATE_KEY secret configured; publishing unsigned APT repo."
            exit 0
          fi
          printf '%s' "${APT_GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Build .deb and apt repo
        env:
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          chmod +x scripts/build-deb.sh scripts/build-apt-repo.sh scripts/build-install.sh
          ./scripts/build-deb.sh
          if [[ -n "${APT_GPG_KEY_ID}" ]]; then
            export GPG_PASSPHRASE="${APT_GPG_PASSPHRASE}"
            ./scripts/build-apt-repo.sh --gpg-key "${APT_GPG_KEY_ID}"
          else
            ./scripts/build-apt-repo.sh
          fi

      - name: Prepare Pages content
        run: |
          mkdir -p public/apt
          cp -a dist/apt/. public/apt/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
